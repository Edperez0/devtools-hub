    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .uuid-display {
            background: #f8f8f8;

            word-break: break-all;

        .controls {
            display: flex;

            display: block;

<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h1>🆔 UUID Generator</h1>
        <p>Generate version 4 UUIDs (Universally Unique Identifiers)</p>

        <div class="uuid-display" id="uuidDisplay"></div>

        <div class="controls">
            <button onclick="generateUUID()">Generate New UUID</button>
            <button onclick="copyUUID()" class="secondary">Copy UUID</button>
        </div>

        <div class="bulk-section">
            <h2 style="margin-bottom: 15px;">Bulk Generate</h2>
            <label>
                Number of UUIDs:
                <input type="number" id="bulkCount" value="10" min="1" max="1000">
            </label>
            <button onclick="generateBulk()" style="margin-top: 10px;">Generate Multiple</button>
            <textarea id="bulkOutput" readonly placeholder="Bulk UUIDs will appear here..."></textarea>
        </div>
    </div>

    <script>
        function uuidv4() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function generateUUID() {
            const uuid = uuidv4();
            document.getElementById('uuidDisplay').textContent = uuid;
        }

        function copyUUID() {
            const uuid = document.getElementById('uuidDisplay').textContent;
            navigator.clipboard.writeText(uuid).then(() => {
                alert('UUID copied to clipboard!');
            });
        }

        function generateBulk() {
            const count = parseInt(document.getElementById('bulkCount').value);
            const uuids = [];
            for (let i = 0; i < Math.min(count, 1000); i++) {
                uuids.push(uuidv4());
            }
            document.getElementById('bulkOutput').value = uuids.join('\n');
        }

        // Generate initial UUID
        generateUUID();
    </script>
</body>
