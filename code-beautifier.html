<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Beautifier - Format JS CSS HTML JSON | DevTools Hub</title>
    <meta name="description" content="Beautify and format JavaScript, CSS, HTML, and JSON code with proper indentation. Free code formatter.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .back-link { color: #667eea; text-decoration: none; font-weight: 500; margin-bottom: 20px; display: inline-block; }
        h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .mode-selector {
            display: flex;
            gap: 10px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .mode-btn.active {
            background: #667eea;
            color: white;
        }
        .section {
            margin: 25px 0;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            margin: 10px 5px;
        }
        button:hover { background: #5568d3; }
        .secondary {
            background: #e0e0e0;
            color: #333;
        }
        .secondary:hover { background: #d0d0d0; }
        .error {
            color: #c33;
            background: #fee;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h1>✨ Code Beautifier</h1>
        <p>Format and beautify your code with proper indentation</p>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('js')">JavaScript</button>
            <button class="mode-btn" onclick="setMode('json')">JSON</button>
            <button class="mode-btn" onclick="setMode('css')">CSS</button>
            <button class="mode-btn" onclick="setMode('html')">HTML</button>
        </div>

        <div class="section">
            <h2>Input Code</h2>
            <textarea id="input" placeholder="Paste your code here..."></textarea>
            <button onclick="beautifyCode()">Beautify</button>
            <button onclick="clearAll()" class="secondary">Clear</button>
            <div id="error" class="error"></div>
        </div>

        <div class="section">
            <h2>Beautified Output</h2>
            <textarea id="output" readonly placeholder="Beautified code will appear here..."></textarea>
            <button onclick="copyOutput()" class="secondary">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        let currentMode = 'js';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            document.getElementById('error').style.display = 'none';
        }

        function beautifyJS(code) {
            let result = '';
            let indent = 0;
            let inString = false;
            let stringChar = '';

            for (let i = 0; i < code.length; i++) {
                const char = code[i];
                const prevChar = code[i - 1];

                // Handle strings
                if ((char === '"' || char === "'" || char === '`') && prevChar !== '\\') {
                    if (!inString) {
                        inString = true;
                        stringChar = char;
                    } else if (char === stringChar) {
                        inString = false;
                    }
                }

                if (!inString) {
                    if (char === '{' || char === '[') {
                        result += char + '\n' + '  '.repeat(++indent);
                    } else if (char === '}' || char === ']') {
                        result += '\n' + '  '.repeat(--indent) + char;
                    } else if (char === ';') {
                        result += char + '\n' + '  '.repeat(indent);
                    } else if (char === ',' && code[i + 1] !== ' ') {
                        result += char + ' ';
                    } else {
                        result += char;
                    }
                } else {
                    result += char;
                }
            }

            return result.replace(/\n\s*\n/g, '\n').trim();
        }

        function beautifyJSON(code) {
            try {
                const parsed = JSON.parse(code);
                return JSON.stringify(parsed, null, 2);
            } catch (e) {
                throw new Error('Invalid JSON: ' + e.message);
            }
        }

        function beautifyCSS(code) {
            return code
                .replace(/\s*{\s*/g, ' {\n  ')
                .replace(/;\s*/g, ';\n  ')
                .replace(/\s*}\s*/g, '\n}\n\n')
                .trim();
        }

        function beautifyHTML(code) {
            let result = '';
            let indent = 0;
            const tags = code.match(/<[^>]+>/g) || [];
            let lastIndex = 0;

            code.replace(/<[^>]+>/g, (match, index) => {
                const text = code.slice(lastIndex, index).trim();
                if (text) {
                    result += '  '.repeat(indent) + text + '\n';
                }

                if (match.startsWith('</')) {
                    indent = Math.max(0, indent - 1);
                    result += '  '.repeat(indent) + match + '\n';
                } else if (match.endsWith('/>')) {
                    result += '  '.repeat(indent) + match + '\n';
                } else {
                    result += '  '.repeat(indent) + match + '\n';
                    indent++;
                }

                lastIndex = index + match.length;
            });

            return result.trim();
        }

        function beautifyCode() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');
            const error = document.getElementById('error');

            error.style.display = 'none';

            if (!input) {
                error.textContent = 'Please enter code to beautify!';
                error.style.display = 'block';
                return;
            }

            try {
                let beautified;
                switch (currentMode) {
                    case 'js':
                        beautified = beautifyJS(input);
                        break;
                    case 'json':
                        beautified = beautifyJSON(input);
                        break;
                    case 'css':
                        beautified = beautifyCSS(input);
                        break;
                    case 'html':
                        beautified = beautifyHTML(input);
                        break;
                }

                output.value = beautified;
            } catch (e) {
                error.textContent = e.message;
                error.style.display = 'block';
            }
        }

        function copyOutput() {
            const output = document.getElementById('output');
            output.select();
            document.execCommand('copy');
            alert('Copied to clipboard!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
