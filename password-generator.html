<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator - Free Online Tool | DevTools Hub</title>
    <meta name="description" content="Generate cryptographically secure random passwords. Free password generator with custom rules.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .back-link { color: #667eea; text-decoration: none; font-weight: 500; margin-bottom: 20px; display: inline-block; }
        h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .password-display {
            background: #f8f8f8;
            padding: 25px;
            border-radius: 12px;
            margin: 25px 0;
            text-align: center;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 1.8em;
            color: #333;
            border: 2px solid #e0e0e0;
            word-break: break-all;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .controls {
            margin: 25px 0;
        }
        .control-group {
            margin: 15px 0;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        input[type="range"] {
            width: 100%;
        }
        .range-value {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            margin-left: 10px;
        }
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 500;
            width: 100%;
            margin: 10px 0;
        }
        button:hover { background: #5568d3; }
        .secondary {
            background: #e0e0e0;
            color: #333;
        }
        .secondary:hover { background: #d0d0d0; }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
            .password-display { font-size: 1.3em; padding: 20px; }
        }
    </style>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6154963071737091"
     crossorigin="anonymous"></script>

</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h1>🔑 Password Generator</h1>
        <p>Generate cryptographically secure random passwords</p>

        <div class="password-display" id="password">Click "Generate" to create a password</div>

        <div class="controls">
            <div class="control-group">
                <label>
                    Length: <span class="range-value" id="lengthValue">16</span>
                </label>
                <input type="range" id="length" min="8" max="64" value="16" oninput="updateLength()">
            </div>

            <div class="control-group">
                <label>Character Types:</label>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="uppercase" checked>
                        Uppercase (A-Z)
                    </label>
                    <label>
                        <input type="checkbox" id="lowercase" checked>
                        Lowercase (a-z)
                    </label>
                    <label>
                        <input type="checkbox" id="numbers" checked>
                        Numbers (0-9)
                    </label>
                    <label>
                        <input type="checkbox" id="symbols" checked>
                        Symbols (!@#$%^&*)
                    </label>
                </div>
            </div>
        </div>

        <button onclick="generatePassword()">Generate Password</button>
        <button onclick="copyPassword()" class="secondary">Copy to Clipboard</button>
    </div>

    <script>
        function updateLength() {
            const length = document.getElementById('length').value;
            document.getElementById('lengthValue').textContent = length;
        }

        function generatePassword() {
            const length = parseInt(document.getElementById('length').value);
            const useUppercase = document.getElementById('uppercase').checked;
            const useLowercase = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;

            let chars = '';
            if (useUppercase) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (useLowercase) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (useNumbers) chars += '0123456789';
            if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (chars === '') {
                alert('Please select at least one character type!');
                return;
            }

            let password = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);

            for (let i = 0; i < length; i++) {
                password += chars[array[i] % chars.length];
            }

            document.getElementById('password').textContent = password;
        }

        function copyPassword() {
            const password = document.getElementById('password').textContent;
            if (password === 'Click "Generate" to create a password') {
                alert('Please generate a password first!');
                return;
            }
            navigator.clipboard.writeText(password).then(() => {
                alert('Password copied to clipboard!');
            });
        }

        // Generate initial password
        generatePassword();
    </script>
</body>
</html>
