<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - Free Online Tool | DevTools Hub</title>
    <meta name="description" content="Generate QR codes for URLs, text, and contact info. Free QR code generator with customizable size.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .back-link { color: #667eea; text-decoration: none; font-weight: 500; margin-bottom: 20px; display: inline-block; }
        h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .input-section {
            margin: 25px 0;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 500;
            width: 100%;
            margin: 15px 0;
        }
        button:hover { background: #5568d3; }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            padding: 30px;
            background: #f8f8f8;
            border-radius: 12px;
        }
        .secondary {
            background: #e0e0e0;
            color: #333;
        }
        .secondary:hover { background: #d0d0d0; }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
        }
    </style>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6154963071737091"
     crossorigin="anonymous"></script>

</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h1>📱 QR Code Generator</h1>
        <p>Generate QR codes instantly for any text or URL</p>

        <div class="input-section">
            <label>Text or URL</label>
            <textarea id="qrText" placeholder="Enter URL, text, or contact info...">https://github.com</textarea>
        </div>

        <div class="input-section">
            <label>Size</label>
            <select id="qrSize">
                <option value="128">Small (128x128)</option>
                <option value="256" selected>Medium (256x256)</option>
                <option value="512">Large (512x512)</option>
                <option value="1024">Extra Large (1024x1024)</option>
            </select>
        </div>

        <button onclick="generateQR()">Generate QR Code</button>

        <div id="qrcode"></div>

        <button onclick="downloadQR()" class="secondary">Download QR Code</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let qrcode = null;

        function generateQR() {
            const text = document.getElementById('qrText').value;
            const size = parseInt(document.getElementById('qrSize').value);
            const container = document.getElementById('qrcode');

            container.innerHTML = '';

            qrcode = new QRCode(container, {
                text: text,
                width: size,
                height: size,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) {
                alert('Please generate a QR code first!');
                return;
            }

            const url = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = url;
            link.click();
        }

        // Generate initial QR code
        generateQR();
    </script>
</body>
</html>
