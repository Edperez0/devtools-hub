<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Minifier - JavaScript CSS HTML | DevTools Hub</title>
    <meta name="description" content="Minify JavaScript, CSS, and HTML code to reduce file size. Free online code minifier tool.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .back-link { color: #667eea; text-decoration: none; font-weight: 500; margin-bottom: 20px; display: inline-block; }
        h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .mode-selector {
            display: flex;
            gap: 10px;
            margin: 25px 0;
        }
        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .mode-btn.active {
            background: #667eea;
            color: white;
        }
        .section {
            margin: 25px 0;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            min-height: 250px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            margin: 10px 5px;
        }
        button:hover { background: #5568d3; }
        .secondary {
            background: #e0e0e0;
            color: #333;
        }
        .secondary:hover { background: #d0d0d0; }
        .stats {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
        }
    </style>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6154963071737091"
     crossorigin="anonymous"></script>

</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h1>⚙️ Code Minifier</h1>
        <p>Minify JavaScript, CSS, and HTML to reduce file size</p>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('js')">JavaScript</button>
            <button class="mode-btn" onclick="setMode('css')">CSS</button>
            <button class="mode-btn" onclick="setMode('html')">HTML</button>
        </div>

        <div class="section">
            <h2>Input Code</h2>
            <textarea id="input" placeholder="Paste your code here..."></textarea>
            <button onclick="minifyCode()">Minify</button>
            <button onclick="clearAll()" class="secondary">Clear</button>
        </div>

        <div class="section">
            <h2>Minified Output</h2>
            <textarea id="output" readonly placeholder="Minified code will appear here..."></textarea>
            <button onclick="copyOutput()" class="secondary">Copy to Clipboard</button>
            <div id="stats" class="stats" style="display: none;"></div>
        </div>
    </div>

    <script>
        let currentMode = 'js';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function minifyJS(code) {
            // Simple JS minification
            return code
                .replace(/\/\*[\s\S]*?\*\/|\/\/.*/g, '') // Remove comments
                .replace(/\s+/g, ' ') // Replace multiple spaces with single space
                .replace(/\s*([{}:;,()=<>+\-*\/])\s*/g, '$1') // Remove spaces around operators
                .trim();
        }

        function minifyCSS(code) {
            return code
                .replace(/\/\*[\s\S]*?\*\//g, '') // Remove comments
                .replace(/\s+/g, ' ') // Replace multiple spaces
                .replace(/\s*([{}:;,>+~])\s*/g, '$1') // Remove spaces
                .replace(/;\}/g, '}') // Remove last semicolon
                .trim();
        }

        function minifyHTML(code) {
            return code
                .replace(/<!--[\s\S]*?-->/g, '') // Remove comments
                .replace(/\s+/g, ' ') // Replace multiple spaces
                .replace(/>\s+</g, '><') // Remove spaces between tags
                .trim();
        }

        function minifyCode() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');
            const stats = document.getElementById('stats');

            if (!input) {
                alert('Please enter code to minify!');
                return;
            }

            let minified;
            switch (currentMode) {
                case 'js':
                    minified = minifyJS(input);
                    break;
                case 'css':
                    minified = minifyCSS(input);
                    break;
                case 'html':
                    minified = minifyHTML(input);
                    break;
            }

            output.value = minified;

            const originalSize = new Blob([input]).size;
            const minifiedSize = new Blob([minified]).size;
            const savings = ((1 - minifiedSize / originalSize) * 100).toFixed(1);

            stats.innerHTML = `
                <strong>Original:</strong> ${originalSize} bytes<br>
                <strong>Minified:</strong> ${minifiedSize} bytes<br>
                <strong>Savings:</strong> ${savings}% (${originalSize - minifiedSize} bytes)
            `;
            stats.style.display = 'block';
        }

        function copyOutput() {
            const output = document.getElementById('output');
            output.select();
            document.execCommand('copy');
            alert('Copied to clipboard!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('stats').style.display = 'none';
        }
    </script>
</body>
</html>
