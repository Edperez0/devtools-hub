<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder Decoder - Free Online Tool | DevTools Hub</title>
    <meta name="description" content="Free Base64 encoder and decoder. Convert text to Base64 and decode Base64 strings instantly. Perfect for data URIs and API testing.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .back-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 20px;
            display: inline-block;
        }
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: background 0.2s;
        }
        button:hover {
            background: #5568d3;
        }
        .secondary {
            background: #e0e0e0;
            color: #333;
        }
        .secondary:hover {
            background: #d0d0d0;
        }
        .section {
            margin-bottom: 30px;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .success {
            background: #efe;
            border: 2px solid #cfc;
            padding: 15px;
            border-radius: 8px;
            color: #3c3;
            margin-top: 15px;
            display: none;
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h1>🔤 Base64 Encoder/Decoder</h1>
        <p>Encode and decode Base64 strings instantly</p>

        <div class="section">
            <h2>Input Text</h2>
            <textarea id="input" placeholder="Enter text to encode or Base64 to decode..."></textarea>
            <div class="controls">
                <button onclick="encodeBase64()">Encode to Base64</button>
                <button onclick="decodeBase64()">Decode from Base64</button>
                <button onclick="copyOutput()" class="secondary">Copy Output</button>
                <button onclick="clearAll()" class="secondary">Clear</button>
            </div>
        </div>

        <div class="section">
            <h2>Output</h2>
            <textarea id="output" readonly placeholder="Output will appear here..."></textarea>
        </div>

        <div id="success" class="success"></div>
    </div>

    <script>
        function encodeBase64() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');
            try {
                output.value = btoa(unescape(encodeURIComponent(input)));
                showSuccess('✓ Encoded successfully!');
            } catch (e) {
                alert('Error encoding: ' + e.message);
            }
        }

        function decodeBase64() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');
            try {
                output.value = decodeURIComponent(escape(atob(input)));
                showSuccess('✓ Decoded successfully!');
            } catch (e) {
                alert('Error decoding: ' + e.message);
            }
        }

        function copyOutput() {
            const output = document.getElementById('output');
            output.select();
            document.execCommand('copy');
            showSuccess('✓ Copied to clipboard!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(message) {
            const success = document.getElementById('success');
            success.textContent = message;
            success.style.display = 'block';
        }
    </script>
</body>
</html>
