<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h1>🔍 Regex Tester</h1>
        <p>Test regular expressions with live matching</p>

        <div class="section">
            <h2>Regular Expression</h2>
            <input type="text" id="regexInput" placeholder="Enter regex pattern..." value="\b\w+@\w+\.\w+\b">
            <div class="flags">
                <label><input type="checkbox" id="flagG" checked> g (global)</label>
                <label><input type="checkbox" id="flagI"> i (case-insensitive)</label>
                <label><input type="checkbox" id="flagM"> m (multiline)</label>
            </div>
            <div id="error" class="error" style="display: none;"></div>
        </div>

        <div class="section">
            <h2>Test String</h2>
            <textarea id="testString" oninput="testRegex()">Contact us at support@example.com or sales@company.org for more information.</textarea>
        </div>

        <div class="section">
            <h2>Matches (Highlighted)</h2>
            <div id="highlightedText"></div>
            <div id="stats" class="stats"></div>
        </div>
    </div>

    <script>
        function testRegex() {
            const pattern = document.getElementById('regexInput').value;
            const testStr = document.getElementById('testString').value;
            const flagG = document.getElementById('flagG').checked;
            const flagI = document.getElementById('flagI').checked;
            const flagM = document.getElementById('flagM').checked;
            const errorDiv = document.getElementById('error');
            const highlightedDiv = document.getElementById('highlightedText');
            const statsDiv = document.getElementById('stats');

            let flags = '';
            if (flagG) flags += 'g';
            if (flagI) flags += 'i';
            if (flagM) flags += 'm';

            try {
                const regex = new RegExp(pattern, flags);
                const matches = testStr.match(regex);

                errorDiv.style.display = 'none';

                if (matches && matches.length > 0) {
                    let highlighted = testStr;
                    const uniqueMatches = [...new Set(matches)];

                    uniqueMatches.forEach(match => {
                        const escMatch = match.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        highlighted = highlighted.replace(new RegExp(escMatch, 'g'), `<span class="match">${match}</span>`);
                    });

                    highlightedDiv.innerHTML = highlighted;
                    statsDiv.innerHTML = `<strong>${matches.length}</strong> matches found`;
                } else {
                    highlightedDiv.textContent = testStr;
                    statsDiv.innerHTML = '<strong>0</strong> matches found';
                }
            } catch (e) {
                errorDiv.textContent = 'Invalid regex: ' + e.message;
                errorDiv.style.display = 'block';
                highlightedDiv.textContent = testStr;
                statsDiv.innerHTML = '';
            }
        }

        // Add event listeners
        document.getElementById('regexInput').addEventListener('input', testRegex);
        document.getElementById('flagG').addEventListener('change', testRegex);
        document.getElementById('flagI').addEventListener('change', testRegex);
        document.getElementById('flagM').addEventListener('change', testRegex);

        // Initial test
        testRegex();
    </script>
</body>
