    <title>Text Diff Checker - Compare Two Texts | DevTools Hub</title>
    <meta name="description" content="Compare two text blocks and highlight differences. Free online diff checker tool.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;

        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .back-link { color: #667eea; text-decoration: none; font-weight: 500; margin-bottom: 20px; display: inline-block; }
        h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 25px 0;
        }
        .text-section h2 {
            color: #333;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 500;
            width: 100%;
            margin: 20px 0;
        }
        button:hover { background: #5568d3; }
        .result-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }
        .diff-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .diff-panel {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .added {
            background-color: #c8e6c9;
            color: #1b5e20;
        }
        .removed {
            background-color: #ffcdd2;
            color: #b71c1c;
        }
        .stats {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        @media (max-width: 1024px) {
            .compare-grid, .diff-display {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
        }
    </style>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6154963071737091"
     crossorigin="anonymous"></script>

</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h1>📊 Diff Checker</h1>
        <p>Compare two text blocks and see differences</p>

        <div class="compare-grid">
            <div class="text-section">
                <h2>Original Text</h2>
                <textarea id="text1" placeholder="Paste first text here...">Hello World
This is a test
Line three</textarea>
            </div>
            <div class="text-section">
                <h2>Modified Text</h2>
                <textarea id="text2" placeholder="Paste second text here...">Hello World
This is a test with changes
Line three
New line</textarea>
            </div>
        </div>

        <button onclick="compareDiff()">Compare Texts</button>

        <div class="result-section" id="resultSection" style="display: none;">
            <h2>Differences</h2>
            <div id="stats" class="stats"></div>
            <div class="diff-display">
                <div>
                    <h3 style="margin-bottom: 10px;">Original</h3>
                    <div class="diff-panel" id="diff1"></div>
                </div>
                <div>
                    <h3 style="margin-bottom: 10px;">Modified</h3>
                    <div class="diff-panel" id="diff2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function compareDiff() {
            const text1 = document.getElementById('text1').value;
            const text2 = document.getElementById('text2').value;

            const lines1 = text1.split('\n');
            const lines2 = text2.split('\n');

            const diff1 = document.getElementById('diff1');
            const diff2 = document.getElementById('diff2');
            const stats = document.getElementById('stats');
            const resultSection = document.getElementById('resultSection');

            let html1 = '';
            let html2 = '';
            let additions = 0;
            let deletions = 0;

            const maxLines = Math.max(lines1.length, lines2.length);

            for (let i = 0; i < maxLines; i++) {
                const line1 = lines1[i] || '';
                const line2 = lines2[i] || '';

                if (line1 === line2) {
                    html1 += line1 + '\n';
                    html2 += line2 + '\n';
                } else {
                    if (line1) {
                        html1 += `<span class="removed">${line1}</span>\n`;
                        deletions++;
                    }
                    if (line2) {
                        html2 += `<span class="added">${line2}</span>\n`;
                        additions++;
                    }
                }
            }

            diff1.innerHTML = html1;
            diff2.innerHTML = html2;
            stats.innerHTML = `<strong>Changes:</strong> ${additions} additions, ${deletions} deletions`;
            resultSection.style.display = 'block';
        }

        // Initial comparison
        compareDiff();
    </script>
</body>
</html>
